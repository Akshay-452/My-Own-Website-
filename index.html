<body>

<header>

<div class="main">

	<div class="product">

    </div>
	
	<div class="product">
        <img src="file:///E:/Akshay/website%20photos/moli%20sev.jpg">
        <h3>Moli Sev</h3>

	<div class="product">
        <img src="https://github.com/Akshay-452/My-Own-Website-/blob/7a6f05f9eb42934f5323dbca54f11b732d2b06f4/mix%20chavanu.jpg">

</div>

<!-- CART -->
<div class="cart">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <div class="total">Total: ₹ <span id="total">0</span></div>
    <button class="buy-btn" onclick="buyNow()">BUY NOW</button>
</div>

</div>

<footer>
    📍 Junadeesa | 📞 Jivanbhai Prajapati 9898452540
</footer>

<script>
let total = 0;
let cartData = [];

function addToCart(name, price) {
    let cartItems = document.getElementById("cart-items");

    let div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = name + " - ₹ " + price +
    "<br><button class='remove-btn' onclick='removeItem(this,"+price+", \""+name+"\")'>Remove</button>";

    cartItems.appendChild(div);

    cartData.push(name + " - ₹ " + price);
    total += price;
    document.getElementById("total").innerText = total;
}

function removeItem(button, price, name) {
    button.parentElement.remove();
    total -= price;
    document.getElementById("total").innerText = total;

    let index = cartData.indexOf(name + " - ₹ " + price);
    if(index > -1){
        cartData.splice(index,1);
    }
}

function buyNow() {
    if(cartData.length === 0){
        alert("Cart is empty!");
        return;
    }

    let message = "New Order:%0A";
    cartData.forEach(item => {
        message += item + "%0A";
    });

    message += "Total: ₹ " + total;

    // Replace number with your WhatsApp number (91 + number)
    window.open("https://wa.me/919574861512?text=" + message);
	

}
</script>
